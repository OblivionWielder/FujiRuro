[ids]
*

[main]
# Remap Caplock to Control
capslock = layer(control)

# Muhenkan (App Key) - The application launcher modifier
muhenkan = layer(nomadic_apps)

# Henkan (Right of space) - Instant File Manager
henkan = M-f

# Hiragana/Katakana - The Spanish Accent Layer
hiragana = layer(spanish_accents)

# Zenkaku_Hankaku - Toggle Waybar (via USR1 signal)
zenkakuhankaku = exec(pkill -USR1 waybar)

[nomadic_apps]
# Core Nomadic App Shortcuts
b = exec(thorium-browser)
f = exec(foot -e yazi)
h = exec(foot -e hx)
n = exec(foot -e newsboat)
m = exec(foot -e aerc)
u = exec(foot -e tremc)
p = exec(/usr/local/bin/android_debug.sh)
w = exec(nm-connection-editor)
l = exec(blueman-manager)
tab = exec(/usr/local/bin/window_switcher.sh)
enter = exec(foot)

[spanish_accents]
# Accented vowels
a = macro(unicode:00e1) # á
e = macro(unicode:00e9) # é
i = macro(unicode:00ed) # í
o = macro(unicode:00f3) # ó
u = macro(unicode:00fa) # ú
n = macro(unicode:00f1) # ñ

# Uppercase accented vowels
A = macro(unicode:00c1) # Á
E = macro(unicode:00c9) # É
I = macro(unicode:00cd) # Í
O = macro(unicode:00d3) # Ó
U = macro(unicode:00da) # Ú
N = macro(unicode:00d1) # Ñ

# Punctuation
1 = macro(unicode:00a1) # ¡
/ = macro(unicode:00bf) # ¿
